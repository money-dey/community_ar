include: package:flutter_lints/flutter.yaml

# Additional lints beyond the flutter_lints baseline.
# These are opinionated but consistent with the codebase's existing style.
linter:
  rules:
    # Encourage explicit types on public APIs
    always_declare_return_types: true
    type_annotate_public_apis: true

    # Discourage common mistakes
    avoid_print: true                   # use a real logger if needed
    avoid_returning_null_for_void: true
    avoid_dynamic_calls: true

    # Style
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_declarations: true
    prefer_final_locals: true
    sort_constructors_first: true

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

  errors:
    # Treat these as compile errors rather than warnings
    missing_required_param: error
    missing_return: error
    todo: info                          # don't flag TODOs; surface in IDE
